<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahjong</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="lobby-wrap">
  <div class="lobby-card" id="section-join">
    <div class="lobby-tiles">🀇🀙🀅🀃</div>
    <div class="lobby-title">Mahjong</div>
    <div class="lobby-subtitle">Hong Kong style · Play with friends</div>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    </div>

    <button class="btn btn-primary" id="btn-create" style="width:100%;margin-bottom:10px">Create Room</button>

    <div class="divider">or join existing</div>

    <div class="form-group">
      <label>Room Code</label>
      <input type="text" id="room-code-input" placeholder="4-letter code" maxlength="4" autocomplete="off"
             style="text-transform:uppercase;letter-spacing:4px;font-weight:800;font-size:1.2rem;text-align:center">
    </div>
    <button class="btn btn-secondary" id="btn-join" style="width:100%">Join Room</button>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="lobby-card hidden" id="section-lobby">
    <div class="lobby-title" style="font-size:1.5rem;margin-bottom:4px">Room</div>
    <div class="room-code-display" id="room-code-display">----</div>
    <div class="room-code-hint">Share this code with friends</div>

    <ul class="players-list" id="players-list"></ul>

    <div id="lobby-actions">
      <button class="btn btn-secondary hidden" id="btn-add-bot" style="width:100%;margin-bottom:10px">🤖 Add Bot</button>
      <button class="btn btn-primary hidden" id="btn-start" style="width:100%">Start Game</button>
      <div class="waiting-hint hidden" id="waiting-hint">Waiting for host to start...</div>
      <button class="btn btn-ghost" id="btn-leave" style="width:100%;margin-top:10px">Leave Room</button>
    </div>
    <div class="error-msg" id="lobby-error"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myIndex = null;
let myCode = null;
let myToken = null;
let isHost = false;

const $ = id => document.getElementById(id);

function showError(msg) { $('error-msg').textContent = msg; }
function showLobbyError(msg) { $('lobby-error').textContent = msg; }

function saveSession() {
  sessionStorage.setItem('mahjong', JSON.stringify({ code: myCode, playerIndex: myIndex, token: myToken }));
}
function clearSession() { sessionStorage.removeItem('mahjong'); }

function showLobby() {
  $('room-code-display').textContent = myCode;
  $('section-join').classList.add('hidden');
  $('section-lobby').classList.remove('hidden');
  updateHostControls();
}

function updateHostControls() {
  $('btn-start').classList.toggle('hidden', !isHost);
  $('btn-add-bot').classList.toggle('hidden', !isHost);
  $('waiting-hint').classList.toggle('hidden', isHost);
}

// Auto-rejoin if we already belong to a room (e.g. back from game page).
// Reads sessionStorage fresh on every (re)connect so creds are never stale.
function tryRejoin() {
  const s = JSON.parse(sessionStorage.getItem('mahjong') || '{}');
  if (s.code && s.token) {
    myCode = s.code;
    myToken = s.token;
    socket.emit('rejoin', { code: s.code, token: s.token });
  }
}
socket.on('connect', tryRejoin);
if (socket.connected) tryRejoin();

socket.on('rejoined', ({ code, playerIndex, isHost: host, state }) => {
  myCode = code;
  myIndex = playerIndex;
  isHost = host;
  saveSession();
  if (state === 'playing') { window.location.href = '/game.html'; return; }
  showLobby();
});

socket.on('rejoinError', () => {
  clearSession();
  myCode = myToken = myIndex = null;
  $('section-lobby').classList.add('hidden');
  $('section-join').classList.remove('hidden');
});

socket.on('identityUpdate', ({ playerIndex, isHost: host }) => {
  myIndex = playerIndex;
  isHost = host;
  saveSession();
  updateHostControls();
});

$('btn-create').addEventListener('click', () => {
  const name = $('player-name').value.trim();
  if (!name) { showError('Please enter your name'); return; }
  socket.emit('createRoom', { playerName: name });
});

$('btn-join').addEventListener('click', doJoin);
$('room-code-input').addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
$('player-name').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-create').click(); });

function doJoin() {
  const name = $('player-name').value.trim();
  const code = $('room-code-input').value.trim().toUpperCase();
  if (!name) { showError('Please enter your name'); return; }
  if (code.length !== 4) { showError('Enter a 4-letter room code'); return; }
  socket.emit('joinRoom', { playerName: name, code });
}

socket.on('roomCreated', ({ code, playerIndex, token }) => {
  myCode = code; myIndex = playerIndex; myToken = token; isHost = true;
  saveSession();
  showLobby();
});

socket.on('roomJoined', ({ code, playerIndex, token }) => {
  myCode = code; myIndex = playerIndex; myToken = token; isHost = false;
  saveSession();
  showLobby();
});

socket.on('joinError', msg => showError(msg));
socket.on('error', msg => { const m = typeof msg === 'string' ? msg : msg.msg; showError(m); showLobbyError(m); });

socket.on('roomUpdate', (room) => {
  const winds = { east:'東', south:'南', west:'西', north:'北' };
  const list = $('players-list');
  list.innerHTML = '';
  room.players.forEach((p, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span>${p.isBot ? '🤖 ' : ''}${p.name}</span>
      <span class="player-wind-badge">${winds[p.seatWind] || p.seatWind}</span>
      ${i === 0 ? '<span class="host-badge">HOST</span>' : ''}
      ${!p.isBot && !p.connected ? '<span style="opacity:0.5;font-size:0.75rem">disconnected</span>' : ''}
    `;
    if (isHost && p.isBot) {
      const btn = document.createElement('button');
      btn.className = 'bot-remove-btn';
      btn.textContent = '✕';
      btn.title = 'Remove bot';
      btn.addEventListener('click', () => socket.emit('removeBot', { index: i }));
      li.appendChild(btn);
    }
    list.appendChild(li);
  });

  if (isHost) {
    $('btn-start').disabled = room.players.length < 2;
    $('btn-start').textContent = room.players.length < 2 ? 'Waiting for players...' : `Start Game (${room.players.length} players)`;
    $('btn-add-bot').classList.toggle('hidden', room.players.length >= 4);
  }
});

socket.on('gameStarted', () => {
  saveSession();
  window.location.href = '/game.html';
});

socket.on('leftRoom', () => {
  clearSession();
  window.location.reload();
});

$('btn-start').addEventListener('click', () => socket.emit('startGame'));
$('btn-add-bot').addEventListener('click', () => socket.emit('addBot'));
$('btn-leave').addEventListener('click', () => socket.emit('leaveRoom'));
</script>
</body>
</html>
